<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>YouTube Zen Launcher — Options</title>
    <style>
      body {
        font: 14px/1.4 system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
        padding: 20px;
        max-width: 760px;
        margin: 0 auto;
      }
      .card {
        border: 2px solid rgba(10, 10, 18, 0.85);
        border-radius: 16px;
        padding: 14px;
        background: #fff;
      }
      label {
        display: block;
        font-weight: 700;
        margin-bottom: 8px;
      }
      input {
        width: 100%;
        padding: 10px 12px;
        border-radius: 12px;
        border: 2px solid rgba(10, 10, 18, 0.85);
      }
      button {
        margin-top: 10px;
        padding: 10px 12px;
        border-radius: 12px;
        border: 2px solid rgba(10, 10, 18, 0.85);
        background: linear-gradient(135deg, rgba(255, 74, 0, 0.95), rgba(255, 138, 0, 0.95));
        color: rgba(10, 10, 18, 0.95);
        font-weight: 800;
        cursor: pointer;
      }
      .hint {
        margin-top: 10px;
        color: rgba(10, 10, 18, 0.65);
      }
      .status {
        margin-top: 10px;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <h2>YouTube Zen Launcher — Options</h2>
    <div class="card">
      <label for="url">Zen site URL</label>
      <input id="url" placeholder="https://<user>.github.io/YouTubeZen/" />
      <button id="save">Save</button>
      <div class="hint">
        Local dev: <code>http://127.0.0.1:5173/</code>
      </div>
      <div id="status" class="status"></div>
    </div>

    <script src="options.js"></script>
  </body>
  </html>
